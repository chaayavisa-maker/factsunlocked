channels:

  # ─────────────────────────────────────────────
  # CHANNEL 1 – FactsUnlocked (original)
  # ─────────────────────────────────────────────
  factsunlocked:
    enabled: true
    channel:
      niche: "amazing facts"
      language: "en-US"
      visual_style: >-
        cinematic dramatic lighting, photorealistic, sharp focus,
        ultra detailed, 8K, award winning photography
    platforms:
      youtube:
        enabled: true
        channel_id: ""
        category_id: "28"
        privacy: "public"
        made_for_kids: false
      tiktok:
        enabled: true
        max_duration_seconds: 60
    groq_api_key_env: "GROQ_API_KEY"
    video:
      scenes_count: 6
      font_size: 68
      fps: 30
      music_volume: 0.12
    tts:
      voice: "en-US-GuyNeural"
      rate: "+5%"

  # ─────────────────────────────────────────────
  # CHANNEL 2 – AstroFacts (new)
  # ─────────────────────────────────────────────
  astrofacts:
    enabled: true
    channel:
      niche: "horoscope astrology"
      language: "en-US"
      visual_style: >-
        cosmic ethereal mystical, nebula and stars, deep space,
        divine light rays, photorealistic, ultra detailed, 8K
    platforms:
      youtube:
        enabled: true
        channel_id: ""
        category_id: "22"
        privacy: "public"
        made_for_kids: false
        playlist_ids:
          daily: ""
          weekly: ""
          monthly: ""
          yearly: ""
      tiktok:
        enabled: true
        max_duration_seconds: 60
    groq_api_key_env: "GROQ_API_KEY_ASTRO"
    video:
      scenes_count: 5
      font_size: 68
      fps: 30
      music_volume: 0.10
      watermark: "AstroFacts ✨"
    tts:
      voice: "en-US-JennyNeural"
      rate: "+5%"
    schedule:
      daily_count: 12
      weekly_enabled: true
      monthly_enabled: true
      yearly_enabled: true

# ─────────────────────────────────────────────
# Shared / global settings
# ─────────────────────────────────────────────
video:
  workspace_dir: "workspace"
  ffmpeg_threads: 2

llm:
  model: "llama-3.3-70b-versatile"
  temperature: 0.7
  max_tokens: 1024
