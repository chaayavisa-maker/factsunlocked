channels:

  # ─────────────────────────────────────────────
  # CHANNEL 1 – FactsUnlocked (existing)
  # ─────────────────────────────────────────────
  factsunlocked:
    enabled: true
    niche: "amazing facts"
    language: "en-US"
    platforms:
      youtube:
        enabled: true
        channel_id: ""            # fill after OAuth
        category_id: "28"         # Science & Technology
        privacy: "public"
        made_for_kids: false
      tiktok:
        enabled: false            # not used for this channel
    groq_api_key_env: "GROQ_API_KEY"
    video:
      scenes_count: 6
      font_size: 72
      resolution: [1080, 1920]
      fps: 30
    tts:
      voice: "en-US-AriaNeural"
    schedule:
      daily_count: 1             # 1 video/day
      cron: "0 9 * * *"

  # ─────────────────────────────────────────────
  # CHANNEL 2 – AstroFacts (new)
  # ─────────────────────────────────────────────
  astrofacts:
    enabled: true
    niche: "horoscope astrology"
    language: "en-US"
    platforms:
      youtube:
        enabled: true
        channel_id: ""            # fill after OAuth
        category_id: "22"         # People & Blogs
        privacy: "public"
        made_for_kids: false
        playlist_ids:
          daily: ""               # fill after creating playlist
          weekly: ""
          monthly: ""
          yearly: ""
      tiktok:
        enabled: true
        max_duration_seconds: 60  # TikTok short format
    groq_api_key_env: "GROQ_API_KEY_ASTRO"   # separate Groq token!
    video:
      scenes_count: 5
      font_size: 68
      resolution: [1080, 1920]
      fps: 30
      watermark: "AstroFacts ✨"
    tts:
      voice: "en-US-JennyNeural"  # warm voice for horoscopes
    schedule:
      # 12 sign videos daily  + weekly + monthly + yearly
      daily_count: 12            # one per zodiac sign
      weekly_enabled: true       # runs every Monday
      monthly_enabled: true      # runs on the 1st of each month
      yearly_enabled: true       # runs on Jan 1st
      # Crons are defined in the workflow files

# ─────────────────────────────────────────────
# Shared / global settings
# ─────────────────────────────────────────────
video:
  workspace_dir: "workspace"
  ffmpeg_threads: 2

image:
  provider: "pollinations"       # free
  timeout_seconds: 90
  width: 1080
  height: 1920

llm:
  model: "llama-3.3-70b-versatile"
  temperature: 0.7
  max_tokens: 1024
