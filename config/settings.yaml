channels:

  # ─────────────────────────────────────────────
  # CHANNEL 1 – FactsUnlocked (original)
  # ─────────────────────────────────────────────
  factsunlocked:
    enabled: true
    channel:
      niche: "amazing facts"
      language: "en-US"
      visual_style: >-
        cinematic dramatic lighting, photorealistic, sharp focus,
        ultra detailed, 8K, award winning photography
    platforms:
      youtube:
        enabled: true
        channel_id: ""
        # IMPROVEMENT: category 27 = Education (was 28 = Science & Technology).
        # Education is a better match for fact-based content and tends to get
        # higher CPM from educational advertisers.
        category_id: "27"
        privacy: "public"
        made_for_kids: false
      tiktok:
        enabled: true
        max_duration_seconds: 60
    groq_api_key_env: "GROQ_API_KEY"
    video:
      scenes_count: 4
      font_size: 68
      fps: 30
      music_volume: 0.12
    tts:
      voice: "en-US-GuyNeural"
      rate: "+5%"

  # ─────────────────────────────────────────────
  # CHANNEL 2 – AstroFacts (astrology)
  # ─────────────────────────────────────────────
  astrofacts:
    enabled: true
    channel:
      niche: "horoscope astrology"
      language: "en-US"
      visual_style: >-
        cosmic ethereal mystical, nebula and stars, deep space,
        divine light rays, photorealistic, ultra detailed, 8K
    platforms:
      youtube:
        enabled: true
        channel_id: ""
        # IMPROVEMENT: category 22 = People & Blogs is correct for astrology/horoscope.
        # (Not Education — horoscope content is personal/lifestyle, not instructional.)
        category_id: "22"
        privacy: "public"
        made_for_kids: false

        # Period playlists — one video per sign per period goes here
        playlist_ids:
          daily: ""      # Fill in: YouTube playlist ID for "Daily Horoscopes"
          weekly: ""     # Fill in: YouTube playlist ID for "Weekly Horoscopes"
          monthly: ""    # Fill in: YouTube playlist ID for "Monthly Horoscopes"
          yearly: ""     # Fill in: YouTube playlist ID for "Yearly Horoscopes"

        # IMPROVEMENT: Sign-specific playlists.
        # Create one playlist per zodiac sign on your channel, then paste the IDs here.
        # Each video will be added to BOTH its sign playlist AND its period playlist.
        # This doubles discoverability: viewers who loved your Aries daily will find
        # your Aries weekly/monthly in the same playlist.
        # Leave empty strings until you've created the playlists.
        sign_playlist_ids:
          Aries: ""
          Taurus: ""
          Gemini: ""
          Cancer: ""
          Leo: ""
          Virgo: ""
          Libra: ""
          Scorpio: ""
          Sagittarius: ""
          Capricorn: ""
          Aquarius: ""
          Pisces: ""

      tiktok:
        enabled: true
        max_duration_seconds: 60

    groq_api_key_env: "GROQ_API_KEY_ASTRO"
    video:
      scenes_count: 2
      font_size: 68
      fps: 30
      music_volume: 0.10
      watermark: "AstroFacts ✨"
    tts:
      voice: "en-US-JennyNeural"
      rate: "+5%"
    schedule:
      daily_count: 12
      weekly_enabled: true
      monthly_enabled: true
      yearly_enabled: true

  # ─────────────────────────────────────────────
  # CHANNEL 3 – AngelNumbers (numerology) — NEW
  # ─────────────────────────────────────────────
  angelnumbers:
    enabled: true
    channel:
      niche: "angel numbers & numerology"
      language: "en-US"
      visual_style: >-
        cosmic ethereal mystical, glowing numerals, soft golden light,
        nebula and stars, photorealistic, ultra detailed, 8K
    platforms:
      youtube:
        enabled: true
        channel_id: ""
        # category 22 = People & Blogs — same lifestyle/spiritual bucket as AstroFacts.
        category_id: "22"
        privacy: "public"
        made_for_kids: false
        # One playlist per angel number (optional — fill in as you create them).
        number_playlist_ids:
          "111": ""
          "222": ""
          "333": ""
          "444": ""
          "555": ""
          "666": ""
          "777": ""
          "888": ""
          "999": ""
          "1111": ""
          "1212": ""
          "000": ""
      tiktok:
        enabled: true
        max_duration_seconds: 60
    groq_api_key_env: "GROQ_API_KEY_ANGEL"
    video:
      scenes_count: 2
      font_size: 68
      fps: 30
      music_volume: 0.10
      watermark: "AngelNumbers ✨"
    tts:
      voice: "en-US-JennyNeural"
      rate: "+5%"
    schedule:
      daily_count: 12

# ─────────────────────────────────────────────
# Shared / global settings
# ─────────────────────────────────────────────
video:
  workspace_dir: "workspace"
  ffmpeg_threads: 2

llm:
  model: "llama-3.3-70b-versatile"
  temperature: 0.7
  max_tokens: 1024
