channels:

  # ─────────────────────────────────────────────
  # CHANNEL 1 – FactsUnlocked (original)
  # ─────────────────────────────────────────────
  factsunlocked:
    enabled: true
    channel:
      niche: "amazing facts"
      language: "en-US"
      visual_style: >-
        cinematic dramatic lighting, photorealistic, sharp focus,
        ultra detailed, 8K, award winning photography
    platforms:
      youtube:
        enabled: true
        channel_id: ""
        # IMPROVEMENT: category 27 = Education (was 28 = Science & Technology).
        # Education is a better match for fact-based content and tends to get
        # higher CPM from educational advertisers.
        category_id: "27"
        privacy: "public"
        made_for_kids: false
      tiktok:
        enabled: true
        max_duration_seconds: 60
    groq_api_key_env: "GROQ_API_KEY"
    video:
      scenes_count: 4
      font_size: 68
      fps: 30
      music_volume: 0.12
    tts:
      voice: "en-US-GuyNeural"
      rate: "+5%"

  # ─────────────────────────────────────────────
  # CHANNEL 2 – AstroFacts (astrology)
  # ─────────────────────────────────────────────
  astrofacts:
    enabled: true
    channel:
      niche: "horoscope astrology"
      language: "en-US"
      visual_style: >-
        cosmic ethereal mystical, nebula and stars, deep space,
        divine light rays, photorealistic, ultra detailed, 8K
    platforms:
      youtube:
        enabled: true
        channel_id: ""
        # IMPROVEMENT: category 22 = People & Blogs is correct for astrology/horoscope.
        # (Not Education — horoscope content is personal/lifestyle, not instructional.)
        category_id: "22"
        privacy: "public"
        made_for_kids: false

        # Period playlists — one video per sign per period goes here
        playlist_ids:
          daily: "PLgXeGnW_FoPHS4ayOFYX9VCN18nwOvOOx"      # Fill in: YouTube playlist ID for "Daily Horoscopes"
          weekly: "PLgXeGnW_FoPHGGiWOH3xT1Wzp7ZffjqI-"     # Fill in: YouTube playlist ID for "Weekly Horoscopes"
          monthly: "PLgXeGnW_FoPHZZaoL_sszlT3H2OtwL7bj"    # Fill in: YouTube playlist ID for "Monthly Horoscopes"
          yearly: "PLgXeGnW_FoPG4siYiHzer5upbDMydtfq"     # Fill in: YouTube playlist ID for "Yearly Horoscopes"

        # IMPROVEMENT: Sign-specific playlists.
        # Create one playlist per zodiac sign on your channel, then paste the IDs here.
        # Each video will be added to BOTH its sign playlist AND its period playlist.
        # This doubles discoverability: viewers who loved your Aries daily will find
        # your Aries weekly/monthly in the same playlist.
        # Leave empty strings until you've created the playlists.
        sign_playlist_ids:
          Aries: "PLgXeGnW_FoPGvZeXMxK0tIcvKv_YbKqJ9"
          Taurus: "PLgXeGnW_FoPGG2oio2Nb-p02MiNZtmAxd"
          Gemini: "PLgXeGnW_FoPFTxP0ujoadsTsxGnZzBkqY"
          Cancer: "PLgXeGnW_FoPHIrFpudjDU8uw-6wNFXpEU"
          Leo: "PLgXeGnW_FoPFxEsdiYEj0ia1xbMEAB0Rj"
          Virgo: "PLgXeGnW_FoPE8TsPxo4FeWJyfKtQGpyaq"
          Libra: "PLgXeGnW_FoPHZoJYfNd8EBzzdbw3tAZGV"
          Scorpio: "PLgXeGnW_FoPG6kbAX6UqikIVH2W72bBxj"
          Sagittarius: "PLgXeGnW_FoPGsMWrsBNxyh8jLzn1Gtatb"
          Capricorn: "PLgXeGnW_FoPF4gpDZL6QqlUGzAUDqxQnO"
          Aquarius: "PLgXeGnW_FoPEz6hmbcepWauG-0dU3oa8q"
          Pisces: "PLgXeGnW_FoPFCdwX6YRYKR3OnPcaTKbPU"

      tiktok:
        enabled: true
        max_duration_seconds: 60

    groq_api_key_env: "GROQ_API_KEY_ASTRO"
    video:
      scenes_count: 2
      font_size: 68
      fps: 30
      music_volume: 0.10
      watermark: "AstroFacts ✨"
    tts:
      voice: "en-US-JennyNeural"
      rate: "+5%"
    schedule:
      daily_count: 12
      weekly_enabled: true
      monthly_enabled: true
      yearly_enabled: true

  # ─────────────────────────────────────────────
  # CHANNEL 3 – AngelNumbers (numerology) — NEW
  # ─────────────────────────────────────────────
  angelnumbers:
    enabled: true
    channel:
      niche: "angel numbers & numerology"
      language: "en-US"
      visual_style: >-
        cosmic ethereal mystical, glowing numerals, soft golden light,
        nebula and stars, photorealistic, ultra detailed, 8K
    platforms:
      youtube:
        enabled: true
        channel_id: ""
        # category 22 = People & Blogs — same lifestyle/spiritual bucket as AstroFacts.
        category_id: "22"
        privacy: "public"
        made_for_kids: false
        # One playlist per angel number (optional — fill in as you create them).
        number_playlist_ids:
          "111": ""
          "222": ""
          "333": ""
          "444": ""
          "555": ""
          "666": ""
          "777": ""
          "888": ""
          "999": ""
          "1111": ""
          "1212": ""
          "000": ""
      tiktok:
        enabled: true
        max_duration_seconds: 60
    groq_api_key_env: "GROQ_API_KEY_ANGEL"
    video:
      scenes_count: 2
      font_size: 68
      fps: 30
      music_volume: 0.10
      watermark: "AngelNumbers ✨"
    tts:
      voice: "en-US-JennyNeural"
      rate: "+5%"
    schedule:
      daily_count: 12

# ─────────────────────────────────────────────
# Shared / global settings
# ─────────────────────────────────────────────
video:
  workspace_dir: "workspace"
  ffmpeg_threads: 2

llm:
  model: "llama-3.3-70b-versatile"
  temperature: 0.7
  max_tokens: 1024
