# ──────────────────────────────────────────────────────────
  # JOB 3 – Resolve which artifact to publish
  # ──────────────────────────────────────────────────────────
  resolve_artifact:
    name: "🔎 Resolve artifact name"
    needs: [preflight, generate]
    if: |
      always() &&
      needs.preflight.result == 'success' &&
      (needs.generate.result == 'success' || needs.generate.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      artifact_name: ${{ steps.pick.outputs.artifact_name }}
      artifact_run_id: ${{ steps.pick.outputs.artifact_run_id }}   # ← NEW

    steps:
      - name: Pick artifact name
        id: pick
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # ── publish-only: user supplied a name explicitly ──────────────────
          if [ -n "${{ github.event.inputs.publish_only }}" ]; then
            ARTIFACT=$(echo "${{ github.event.inputs.publish_only }}" | xargs)

            # Must query the API to find which run owns this artifact
            RUN_ID=$(gh api \
              "repos/${{ github.repository }}/actions/artifacts?per_page=100" \
              --jq '[.artifacts[] | select(.name == "'"$ARTIFACT"'") | select(.expired == false)] | sort_by(.created_at) | last | .workflow_run.id')

            if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
              echo "❌ Could not find non-expired artifact: $ARTIFACT"
              exit 1
            fi

            echo "artifact_name=$ARTIFACT"       >> "$GITHUB_OUTPUT"
            echo "artifact_run_id=$RUN_ID"       >> "$GITHUB_OUTPUT"
            echo "✅ publish-only mode → $ARTIFACT (run $RUN_ID)"
            exit 0
          fi

          # ── normal flow: artifact lives in THIS run ────────────────────────
          ARTIFACT="${{ needs.generate.outputs.artifact_name }}"
          if [ -n "$ARTIFACT" ]; then
            echo "artifact_name=$ARTIFACT"               >> "$GITHUB_OUTPUT"
            echo "artifact_run_id=${{ github.run_id }}"  >> "$GITHUB_OUTPUT"
            echo "✅ normal flow → $ARTIFACT (run ${{ github.run_id }})"
            exit 0
          fi

          # ── last-resort fallback ───────────────────────────────────────────
          echo "⚠️  generate output empty – querying API for latest factsunlocked-daily-* artifact…"
          LATEST_JSON=$(gh api \
            "repos/${{ github.repository }}/actions/artifacts?per_page=100" \
            --jq '[.artifacts[] | select(.name | startswith("factsunlocked-daily-")) | select(.expired == false)] | sort_by(.created_at) | last')

          LATEST=$(echo "$LATEST_JSON" | jq -r '.name')
          RUN_ID=$(echo "$LATEST_JSON"  | jq -r '.workflow_run.id')

          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "❌ No unexpired factsunlocked-daily-* artifact found."
            exit 1
          fi

          echo "artifact_name=$LATEST"     >> "$GITHUB_OUTPUT"
          echo "artifact_run_id=$RUN_ID"   >> "$GITHUB_OUTPUT"
          echo "✅ fallback → $LATEST (run $RUN_ID)"
