name: FactsUnlocked – Daily Video

permissions:
  actions: read
  contents: read

on:
  schedule:
    # IMPROVEMENT: Changed from 09:00 UTC (11am Paris / 5am EST) to 14:00 UTC.
    # 14:00 UTC = 10:00 EST / 07:00 PST — peak morning scroll window for US audience.
    # YouTube's algorithm gives each video its biggest push in the first 30-60 minutes,
    # so uploading when your audience is active dramatically increases early view velocity.
    - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      publish_only:
        description: |
          Re-publish a previous run without regenerating.
          Paste the artifact NAME EXACTLY as shown in the Actions run
          (e.g. factsunlocked_2026-06-04_f99b48).
          Leave blank for a full generate + publish run.
        required: false
        default: ""
      skip_youtube:
        description: "Skip YouTube upload for this run (true/false)"
        required: false
        default: "false"
      skip_tiktok:
        description: "Skip TikTok upload for this run (true/false)"
        required: false
        default: "false"

jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 1 – Preflight: validate every secret before burning compute
  # ──────────────────────────────────────────────────────────
  preflight:
    name: "🔍 Preflight checks"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install check dependencies
        run: pip install httpx

      - name: Check all credentials
        env:
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          TIKTOK_CLIENT_KEY:     ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET:  ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_REFRESH_TOKEN:  ${{ secrets.TIKTOK_REFRESH_TOKEN }}
        run: |
          SKIP_FLAGS=""
          if [ "${{ github.event.inputs.skip_youtube }}" = "true" ]; then
            SKIP_FLAGS="$SKIP_FLAGS --skip-youtube"
          fi
          if [ "${{ github.event.inputs.skip_tiktok }}" = "true" ]; then
            SKIP_FLAGS="$SKIP_FLAGS --skip-tiktok"
          fi
          python scripts/preflight_check.py --channel factsunlocked $SKIP_FLAGS

  # ──────────────────────────────────────────────────────────
  # JOB 2 – Generate: Groq → images → TTS → render
  # Skipped entirely when publish_only is set.
  # ──────────────────────────────────────────────────────────
  generate:
    name: "🎬 Generate video"
    needs: preflight
    if: ${{ github.event.inputs.publish_only == '' || github.event.inputs.publish_only == null }}
    runs-on: ubuntu-latest
    timeout-minutes: 1000
    outputs:
      artifact_name: ${{ steps.run.outputs.artifact_name }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-liberation

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate video
        id: run
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          POLLINATIONS_TOKEN: ${{ secrets.POLLINATIONS_TOKEN }}
          PYTHONPATH:         ${{ github.workspace }}
        run: python src/main.py --channel factsunlocked

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.run.outputs.artifact_name }}
          path: workspace/
          retention-days: 3

  # ──────────────────────────────────────────────────────────
  # JOB 3 – Publish: upload to YouTube and TikTok
  # Runs after generate, or directly in publish_only mode.
  # ──────────────────────────────────────────────────────────
  publish:
    name: "🚀 Publish video"
    needs: generate
    if: always() && (needs.generate.result == 'success' || github.event.inputs.publish_only != '')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Determine artifact name
        id: artifact
        run: |
          if [ -n "${{ github.event.inputs.publish_only }}" ]; then
            echo "name=${{ github.event.inputs.publish_only }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ needs.generate.outputs.artifact_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Download video artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: workspace/

      - name: Publish to platforms
        env:
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          TIKTOK_CLIENT_KEY:     ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET:  ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_REFRESH_TOKEN:  ${{ secrets.TIKTOK_REFRESH_TOKEN }}
          PYTHONPATH:            ${{ github.workspace }}
        run: |
          SKIP_FLAGS=""
          if [ "${{ github.event.inputs.skip_youtube }}" = "true" ]; then
            SKIP_FLAGS="$SKIP_FLAGS --skip-youtube"
          fi
          if [ "${{ github.event.inputs.skip_tiktok }}" = "true" ]; then
            SKIP_FLAGS="$SKIP_FLAGS --skip-tiktok"
          fi
          python src/main.py --channel factsunlocked --publish-only workspace/ $SKIP_FLAGS
