name: FactsUnlocked – Daily Video

on:
  schedule:
    - cron: "0 9 * * *"          # every day at 09:00 UTC
  workflow_dispatch:
    inputs:
      publish_only:
        description: |
          Re-publish a previous run without regenerating.
          Paste the GitHub Actions numeric run ID (found in the URL of the
          original workflow run, e.g. 15234567890).
          Leave blank for a full generate + publish run.
        required: false
        default: ""

jobs:
  # ────────────────────────────────────────────────────────────
  # JOB 1 – Preflight: validate every secret before burning compute
  # ────────────────────────────────────────────────────────────
  preflight:
    name: "🔍 Preflight checks"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install check dependencies
        run: pip install httpx

      - name: Check all credentials
        env:
          GROQ_API_KEY:                  ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_CLIENT_ID:             ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:         ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN:         ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          TIKTOK_CLIENT_KEY_ASTRO:       ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET_ASTRO:    ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_REFRESH_TOKEN_ASTRO:    ${{ secrets.TIKTOK_REFRESH_TOKEN }}
        run: python scripts/preflight_check.py --channel factsunlocked

  # ────────────────────────────────────────────────────────────
  # JOB 2 – Generate: Groq → images → TTS → render
  # Skipped entirely when publish_only is set.
  # ────────────────────────────────────────────────────────────
  generate:
    name: "🎬 Generate video"
    needs: preflight
    if: ${{ github.event.inputs.publish_only == '' || github.event.inputs.publish_only == null }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      metadata_path: ${{ steps.run.outputs.metadata_path }}
      run_id:        ${{ steps.run.outputs.run_id }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-liberation

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate video
        id: run
        env:
          GROQ_API_KEY:           ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_CLIENT_ID:      ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:  ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN:  ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          TIKTOK_CLIENT_KEY:      ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET:   ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_REFRESH_TOKEN:   ${{ secrets.TIKTOK_REFRESH_TOKEN }}
          PYTHONPATH:             ${{ github.workspace }}:${{ github.workspace }}/src
        run: |
          python src/main.py
          # Find the metadata.json that was just written
          META=$(find workspace -name "metadata.json" | sort | tail -1)
          RUN_ID=$(python -c "import json; print(json.load(open('$META'))['run_id'])")
          echo "metadata_path=$META"  >> "$GITHUB_OUTPUT"
          echo "run_id=$RUN_ID"       >> "$GITHUB_OUTPUT"
          echo "Metadata: $META  |  run_id: $RUN_ID"

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.run.outputs.run_id }}
          path: workspace/${{ steps.run.outputs.run_id }}/
          retention-days: 3

  # ────────────────────────────────────────────────────────────
  # JOB 3 – Publish: upload to YouTube
  # Can be re-run independently by passing publish_only=<github_run_id>
  # ────────────────────────────────────────────────────────────
  publish:
    name: "📤 Publish to YouTube"
    needs: [preflight, generate]
    if: |
      always() &&
      needs.preflight.result == 'success' &&
      (needs.generate.result == 'success' || needs.generate.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read      # ← allows downloading artifacts from other runs
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # Normal flow: download artifact produced by the generate job (same run)
      - name: Download artifact (normal flow)
        if: ${{ github.event.inputs.publish_only == '' || github.event.inputs.publish_only == null }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.generate.outputs.run_id }}
          path: workspace/${{ needs.generate.outputs.run_id }}/

      # Re-run flow: download all artifacts from a previous workflow run by its numeric GitHub run ID
      - name: Download artifact (publish-only re-run)
        if: ${{ github.event.inputs.publish_only != '' && github.event.inputs.publish_only != null }}
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.inputs.publish_only }}
          path: workspace/

      - name: Resolve metadata path
        id: meta
        run: |
          META=$(find workspace -name "metadata.json" | sort | tail -1)
          if [ -z "$META" ]; then
            echo "ERROR: No metadata.json found under workspace/"
            exit 1
          fi
          echo "path=$META" >> "$GITHUB_OUTPUT"
          echo "Resolved metadata: $META"

      - name: Publish to YouTube
        env:
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          TIKTOK_CLIENT_KEY:     ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET:  ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_REFRESH_TOKEN:  ${{ secrets.TIKTOK_REFRESH_TOKEN }}
          PYTHONPATH:            ${{ github.workspace }}:${{ github.workspace }}/src
        run: python src/main.py --publish-only ${{ steps.meta.outputs.path }}
