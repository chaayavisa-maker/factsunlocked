name: AstroFacts – Daily Horoscopes (12 Signs)

on:
  schedule:
    - cron: "0 6 * * *"          # every day at 06:00 UTC
  workflow_dispatch:
    inputs:
      sign:
        description: "Regenerate & publish a single sign (leave blank for all 12)"
        required: false
        default: ""
      publish_only:
        description: |
          Re-publish without regenerating.
          Paste the artifact name (e.g. astrofacts-daily-2026-06-01).
          Leave blank for a full generate + publish run.
        required: false
        default: ""
      skip_youtube:
        description: "Skip YouTube upload for this run (true/false)"
        required: false
        default: "false"
      skip_tiktok:
        description: "Skip TikTok upload for this run (true/false)"
        required: false
        default: "false"

jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 1 – Preflight
  # ──────────────────────────────────────────────────────────
  preflight:
    name: "🔍 Preflight checks"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install check dependencies
        run: pip install httpx

      - name: Check all credentials
        env:
          GROQ_API_KEY_ASTRO:          ${{ secrets.GROQ_API_KEY_ASTRO }}
          YOUTUBE_CLIENT_ID_ASTRO:     ${{ secrets.YOUTUBE_CLIENT_ID_ASTRO }}
          YOUTUBE_CLIENT_SECRET_ASTRO: ${{ secrets.YOUTUBE_CLIENT_SECRET_ASTRO }}
          YOUTUBE_REFRESH_TOKEN_ASTRO: ${{ secrets.YOUTUBE_REFRESH_TOKEN_ASTRO }}
          TIKTOK_CLIENT_KEY_ASTRO:     ${{ secrets.TIKTOK_CLIENT_KEY_ASTRO }}
          TIKTOK_CLIENT_SECRET_ASTRO:  ${{ secrets.TIKTOK_CLIENT_SECRET_ASTRO }}
          TIKTOK_REFRESH_TOKEN_ASTRO:  ${{ secrets.TIKTOK_REFRESH_TOKEN_ASTRO }}
        run: |
          FLAGS=""
          [ "${{ github.event.inputs.skip_youtube }}" = "true" ] && FLAGS="$FLAGS --skip-youtube"
          [ "${{ github.event.inputs.skip_tiktok }}"  = "true" ] && FLAGS="$FLAGS --skip-tiktok"
          python scripts/preflight_check.py --channel astrofacts $FLAGS

  # ──────────────────────────────────────────────────────────
  # JOB 2 – Generate (12 signs → 12 video files + manifest)
  # Skipped entirely when publish_only is set.
  # ──────────────────────────────────────────────────────────
  generate:
    name: "🎬 Generate videos"
    needs: preflight
    if: ${{ github.event.inputs.publish_only == '' || github.event.inputs.publish_only == null }}
    runs-on: ubuntu-latest
    timeout-minutes: 110
    outputs:
      manifest_path: ${{ steps.run.outputs.manifest_path }}
      artifact_name: ${{ steps.run.outputs.artifact_name }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-liberation

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate all 12 signs
        id: run
        env:
          GROQ_API_KEY_ASTRO: ${{ secrets.GROQ_API_KEY_ASTRO }}
          PYTHONPATH:         ${{ github.workspace }}
        run: |
          SIGN_ARG=""
          [ -n "${{ github.event.inputs.sign }}" ] && SIGN_ARG="--sign ${{ github.event.inputs.sign }}"
          python src/astrofacts_main.py --period daily $SIGN_ARG

          MANIFEST=$(find workspace -name "manifest_daily_*.json" | sort | tail -1)
          ARTIFACT="astrofacts-daily-$(date +%Y-%m-%d)"
          echo "manifest_path=$MANIFEST" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$ARTIFACT" >> "$GITHUB_OUTPUT"
          echo "Manifest: $MANIFEST"

      - name: Upload workspace artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.run.outputs.artifact_name }}
          path: workspace/
          retention-days: 3

  # ──────────────────────────────────────────────────────────
  # JOB 3a – Publish to YouTube
  # Re-run independently: set publish_only=<artifact> + skip_tiktok=true
  # ──────────────────────────────────────────────────────────
  publish-youtube:
    name: "▶️ Publish to YouTube"
    needs: [preflight, generate]
    if: |
      always() &&
      needs.preflight.result == 'success' &&
      (needs.generate.result == 'success' || needs.generate.result == 'skipped') &&
      github.event.inputs.skip_youtube != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Download artifact (normal flow)
        if: ${{ github.event.inputs.publish_only == '' || github.event.inputs.publish_only == null }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.generate.outputs.artifact_name }}
          path: workspace/

      - name: Download artifact (publish-only re-run)
        if: ${{ github.event.inputs.publish_only != '' && github.event.inputs.publish_only != null }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ github.event.inputs.publish_only }}
          path: workspace/

      - name: Resolve manifest path
        id: meta
        run: |
          # Try the generate-job output first, then fall back to scanning disk
          # (the output var is always empty on a different runner)
          MANIFEST="${{ needs.generate.outputs.manifest_path }}"
          if [ -z "$MANIFEST" ] || [ ! -f "$MANIFEST" ]; then
            MANIFEST=$(find workspace -name "manifest_daily_*.json" | sort | tail -1)
          fi
          if [ -z "$MANIFEST" ]; then
            echo "❌ No manifest found in workspace/" && exit 1
          fi
          echo "manifest=$MANIFEST" >> "$GITHUB_OUTPUT"
          echo "Resolved manifest: $MANIFEST"

      - name: Publish to YouTube
        env:
          YOUTUBE_CLIENT_ID_ASTRO:     ${{ secrets.YOUTUBE_CLIENT_ID_ASTRO }}
          YOUTUBE_CLIENT_SECRET_ASTRO: ${{ secrets.YOUTUBE_CLIENT_SECRET_ASTRO }}
          YOUTUBE_REFRESH_TOKEN_ASTRO: ${{ secrets.YOUTUBE_REFRESH_TOKEN_ASTRO }}
          PYTHONPATH:                  ${{ github.workspace }}
        run: |
          SIGN_ARG=""
          [ -n "${{ github.event.inputs.sign }}" ] && SIGN_ARG="--sign ${{ github.event.inputs.sign }}"
          python src/astrofacts_main.py \
            --period daily \
            --publish-only "${{ steps.meta.outputs.manifest }}" \
            --skip-tiktok \
            $SIGN_ARG

  # ──────────────────────────────────────────────────────────
  # JOB 3b – Publish to TikTok
  # Re-run independently: set publish_only=<artifact> + skip_youtube=true
  # ──────────────────────────────────────────────────────────
  publish-tiktok:
    name: "🎵 Publish to TikTok"
    needs: [preflight, generate]
    if: |
      always() &&
      needs.preflight.result == 'success' &&
      (needs.generate.result == 'success' || needs.generate.result == 'skipped') &&
      github.event.inputs.skip_tiktok != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Download artifact (normal flow)
        if: ${{ github.event.inputs.publish_only == '' || github.event.inputs.publish_only == null }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.generate.outputs.artifact_name }}
          path: workspace/

      - name: Download artifact (publish-only re-run)
        if: ${{ github.event.inputs.publish_only != '' && github.event.inputs.publish_only != null }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ github.event.inputs.publish_only }}
          path: workspace/

      - name: Resolve manifest path
        id: meta
        run: |
          MANIFEST="${{ needs.generate.outputs.manifest_path }}"
          if [ -z "$MANIFEST" ] || [ ! -f "$MANIFEST" ]; then
            MANIFEST=$(find workspace -name "manifest_daily_*.json" | sort | tail -1)
          fi
          if [ -z "$MANIFEST" ]; then
            echo "❌ No manifest found in workspace/" && exit 1
          fi
          echo "manifest=$MANIFEST" >> "$GITHUB_OUTPUT"
          echo "Resolved manifest: $MANIFEST"

      - name: Publish to TikTok
        env:
          TIKTOK_CLIENT_KEY_ASTRO:    ${{ secrets.TIKTOK_CLIENT_KEY_ASTRO }}
          TIKTOK_CLIENT_SECRET_ASTRO: ${{ secrets.TIKTOK_CLIENT_SECRET_ASTRO }}
          TIKTOK_REFRESH_TOKEN_ASTRO: ${{ secrets.TIKTOK_REFRESH_TOKEN_ASTRO }}
          PYTHONPATH:                 ${{ github.workspace }}
        run: |
          SIGN_ARG=""
          [ -n "${{ github.event.inputs.sign }}" ] && SIGN_ARG="--sign ${{ github.event.inputs.sign }}"
          python src/astrofacts_main.py \
            --period daily \
            --publish-only "${{ steps.meta.outputs.manifest }}" \
            --skip-youtube \
            $SIGN_ARG
