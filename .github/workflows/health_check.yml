name: 🩺 Weekly Health Check

on:
  schedule:
    # Every Monday at 07:00 UTC — two hours before the daily video runs
    - cron: "0 7 * * 1"
  workflow_dispatch:

jobs:
  health-check:
    name: Validate all credentials
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -q requests edge-tts

      - name: Run validation
        id: validate
        env:
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          PYTHONPATH:            ${{ github.workspace }}/src
        run: python scripts/validate_credentials.py

      - name: Write health summary
        if: always()
        run: |
          if [ "${{ steps.validate.outcome }}" == "success" ]; then
            echo "## ✅ Weekly health check passed" >> $GITHUB_STEP_SUMMARY
            echo "All credentials and APIs are working." >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Weekly health check FAILED" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Action required** — one or more credentials need renewal." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Most common cause: YouTube OAuth token expired." >> $GITHUB_STEP_SUMMARY
            echo "**Fix:** Run \`python scripts/get_youtube_token.py\` locally" >> $GITHUB_STEP_SUMMARY
            echo "and update the \`YOUTUBE_REFRESH_TOKEN\` secret." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
            echo "::error::Health check failed — credentials need renewal"
          fi
