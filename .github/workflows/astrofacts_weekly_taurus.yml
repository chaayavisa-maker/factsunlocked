# ============================================================
#  AstroFacts - Weekly - Taurus
#  Token: POLLINATIONS_TOKEN_ASTRO_2
#  Runs every Friday at the SAME time-of-day as the Taurus daily
#  workflow (3:10 UTC), generating the horoscope for the
#  UPCOMING week (next Monday - Sunday), not the current one.
#  Reference date is computed as "next monday" inside
#  _base_astrofacts_weekly.yml / default_reference_date().
# ============================================================
name: "AstroFacts - Weekly - Taurus"
permissions:
  actions: read
  contents: read

on:
  schedule:
    - cron: "10 3 * * 5"
  workflow_dispatch:
    inputs:
      publish_only:
        description: >
          Re-publish without regenerating.
          Paste the artifact NAME from a previous run
          (e.g. astrofacts-weekly-taurus-2026-06-01).
          Leave blank for a full generate + publish run.
        required: false
        default: ""
      skip_youtube:
        description: "Skip YouTube upload for this run (true/false)"
        required: false
        default: "false"
      skip_tiktok:
        description: "Skip TikTok upload for this run (true/false)"
        required: false
        default: "false"

jobs:
  run:
    name: "Run weekly base workflow for Taurus"
    uses: ./.github/workflows/_base_astrofacts_weekly.yml
    with:
      sign:         "taurus"
      publish_only: ${{ github.event.inputs.publish_only || '' }}
      skip_youtube: ${{ github.event.inputs.skip_youtube == 'true' }}
      skip_tiktok:  ${{ github.event.inputs.skip_tiktok  == 'true' }}
    secrets:
      GROQ_API_KEY_ASTRO:          ${{ secrets.GROQ_API_KEY_ASTRO }}
      POLLINATIONS_TOKEN:          ${{ secrets.POLLINATIONS_TOKEN_ASTRO_2 }}
      YOUTUBE_CLIENT_ID_ASTRO:     ${{ secrets.YOUTUBE_CLIENT_ID_ASTRO }}
      YOUTUBE_CLIENT_SECRET_ASTRO: ${{ secrets.YOUTUBE_CLIENT_SECRET_ASTRO }}
      YOUTUBE_REFRESH_TOKEN_ASTRO: ${{ secrets.YOUTUBE_REFRESH_TOKEN_ASTRO }}
      TIKTOK_CLIENT_KEY_ASTRO:     ${{ secrets.TIKTOK_CLIENT_KEY_ASTRO }}
      TIKTOK_CLIENT_SECRET_ASTRO:  ${{ secrets.TIKTOK_CLIENT_SECRET_ASTRO }}
      TIKTOK_REFRESH_TOKEN_ASTRO:  ${{ secrets.TIKTOK_REFRESH_TOKEN_ASTRO }}
