name: AngelNumbers – Daily (12 Numbers)
permissions:
  actions: read
  contents: read
on:
  #schedule:
    #- cron: "0 5 * * *"
  workflow_dispatch:
    inputs:
      number:
        description: "Regenerate & publish a single number (leave blank for all 12)"
        required: false
        default: ""
      publish_only:
        description: |
          Re-publish without regenerating.
          Paste the artifact NAME from a previous run
          (e.g. angelnumbers-daily-2026-06-01).
          Leave blank for a full generate + publish run.
        required: false
        default: ""
      skip_youtube:
        description: "Skip YouTube upload for this run (true/false)"
        required: false
        default: "false"
      skip_tiktok:
        description: "Skip TikTok upload for this run (true/false)"
        required: false
        default: "false"

jobs:
  preflight:
    name: "🔍 Preflight checks"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install check dependencies
        run: pip install httpx
      - name: Check all credentials
        env:
          GROQ_API_KEY_ANGEL:            ${{ secrets.GROQ_API_KEY_ANGEL }}
          YOUTUBE_CLIENT_ID_ANGEL:       ${{ secrets.YOUTUBE_CLIENT_ID_ANGEL }}
          YOUTUBE_CLIENT_SECRET_ANGEL:   ${{ secrets.YOUTUBE_CLIENT_SECRET_ANGEL }}
          YOUTUBE_REFRESH_TOKEN_ANGEL:   ${{ secrets.YOUTUBE_REFRESH_TOKEN_ANGEL }}
          TIKTOK_CLIENT_KEY_ANGEL:       ${{ secrets.TIKTOK_CLIENT_KEY_ANGEL }}
          TIKTOK_CLIENT_SECRET_ANGEL:    ${{ secrets.TIKTOK_CLIENT_SECRET_ANGEL }}
          TIKTOK_REFRESH_TOKEN_ANGEL:    ${{ secrets.TIKTOK_REFRESH_TOKEN_ANGEL }}
        run: |
          SKIP_FLAGS=""
          if [ "${{ github.event.inputs.skip_youtube }}" = "true" ]; then
            SKIP_FLAGS="$SKIP_FLAGS --skip-youtube"
          fi
          if [ "${{ github.event.inputs.skip_tiktok }}" = "true" ]; then
            SKIP_FLAGS="$SKIP_FLAGS --skip-tiktok"
          fi
          python scripts/preflight_check.py --channel angelnumbers $SKIP_FLAGS

  generate:
    name: "🎬 Generate videos"
    needs: preflight
    if: ${{ github.event.inputs.publish_only == '' || github.event.inputs.publish_only == null }}
    runs-on: ubuntu-latest
    timeout-minutes: 1500
    outputs:
      manifest_path: ${{ steps.run.outputs.manifest_path }}
      artifact_name: ${{ steps.run.outputs.artifact_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-liberation
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Generate all 12 angel numbers
        id: run
        env:
          GROQ_API_KEY_ANGEL: ${{ secrets.GROQ_API_KEY_ANGEL }}
          POLLINATIONS_TOKEN: ${{ secrets.POLLINATIONS_TOKEN_ANGEL }}
          PYTHONPATH:         ${{ github.workspace }}
        run: |
          REFERENCE_DATE=$(date -u -d "tomorrow" +%Y-%m-%d)
          echo "Content reference date: $REFERENCE_DATE"

          NUMBER_ARG=""
          if [ -n "${{ github.event.inputs.number }}" ]; then
            NUMBER_ARG="--number ${{ github.event.inputs.number }}"
          fi

          python src/angelnumbers_main.py \
            --reference-date "$REFERENCE_DATE" \
            $NUMBER_ARG

          MANIFEST=$(find workspace -name "manifest_angelnumbers_daily_*.json" | sort | tail -1)
          if [ -z "$MANIFEST" ]; then
            echo "No manifest_angelnumbers_daily_*.json found in workspace/ after generation."
            exit 1
          fi

          DATE=$(echo "$MANIFEST" | grep -oP '\d{4}-\d{2}-\d{2}')
          if [ -z "$DATE" ]; then
            DATE=$(date -u +%Y-%m-%d)
          fi
          ARTIFACT="angelnumbers-daily-${DATE}"

          echo "manifest_path=$MANIFEST" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$ARTIFACT" >> "$GITHUB_OUTPUT"
          echo "Manifest : $MANIFEST"
          echo "Artifact : $ARTIFACT"
      - name: Upload workspace artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.run.outputs.artifact_name }}
          path: workspace/
          retention-days: 3

  resolve_artifact:
    name: "🔎 Resolve artifact name"
    needs: [preflight, generate]
    if: |
      always() &&
      needs.preflight.result == 'success' &&
      (needs.generate.result == 'success' || needs.generate.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      artifact_name: ${{ steps.pick.outputs.artifact_name }}
    steps:
      - name: Pick artifact name
        id: pick
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.publish_only }}" ]; then
            NORMALIZED=$(echo "${{ github.event.inputs.publish_only }}" | tr '_' '-')
            echo "artifact_name=$NORMALIZED" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ARTIFACT="${{ needs.generate.outputs.artifact_name }}"
          if [ -n "$ARTIFACT" ]; then
            echo "artifact_name=$ARTIFACT" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          LATEST=$(gh api \
            "repos/${{ github.repository }}/actions/artifacts?per_page=100" \
            --jq '[.artifacts[] | select(.name | startswith("angelnumbers-daily-")) | select(.expired == false)] | sort_by(.created_at) | last | .name')
          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "No unexpired angelnumbers-daily-* artifact found."
            exit 1
          fi
          echo "artifact_name=$LATEST" >> "$GITHUB_OUTPUT"

  publish_youtube:
    name: "▶️ Publish to YouTube"
    needs: [preflight, resolve_artifact]
    if: |
      always() &&
      needs.preflight.result == 'success' &&
      needs.resolve_artifact.result == 'success' &&
      github.event.inputs.skip_youtube != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Resolve artifact run-id
        id: artifact_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACT_NAME: ${{ needs.resolve_artifact.outputs.artifact_name }}
        run: |
          RUN_ID=$(gh api \
            "repos/${{ github.repository }}/actions/artifacts?per_page=100" \
            --jq '[.artifacts[] | select(.name == "'"$ARTIFACT_NAME"'") | select(.expired == false)] | sort_by(.created_at) | last | .workflow_run.id')
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "Could not find non-expired artifact: $ARTIFACT_NAME"
            exit 1
          fi
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.resolve_artifact.outputs.artifact_name }}
          path: workspace/
          run-id: ${{ steps.artifact_run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve manifest path
        id: meta
        run: |
          MANIFEST=$(find workspace -name "manifest_*.json" | sort | tail -1)
          if [ -z "$MANIFEST" ]; then
            echo "No manifest found – aborting."
            exit 1
          fi
          echo "manifest=$MANIFEST" >> "$GITHUB_OUTPUT"
      - name: Publish to YouTube
        env:
          YOUTUBE_CLIENT_ID_ANGEL:     ${{ secrets.YOUTUBE_CLIENT_ID_ANGEL }}
          YOUTUBE_CLIENT_SECRET_ANGEL: ${{ secrets.YOUTUBE_CLIENT_SECRET_ANGEL }}
          YOUTUBE_REFRESH_TOKEN_ANGEL: ${{ secrets.YOUTUBE_REFRESH_TOKEN_ANGEL }}
          PYTHONPATH:                  ${{ github.workspace }}
        run: |
          NUMBER_ARG=""
          if [ -n "${{ github.event.inputs.number }}" ]; then
            NUMBER_ARG="--number ${{ github.event.inputs.number }}"
          fi
          python src/angelnumbers_main.py \
            --publish-only "${{ steps.meta.outputs.manifest }}" \
            --skip-tiktok \
            $NUMBER_ARG

  publish_tiktok:
    name: "🎵 Publish to TikTok"
    needs: [preflight, resolve_artifact]
    if: |
      always() &&
      needs.preflight.result == 'success' &&
      needs.resolve_artifact.result == 'success' &&
      github.event.inputs.skip_tiktok != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Resolve artifact run-id
        id: artifact_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACT_NAME: ${{ needs.resolve_artifact.outputs.artifact_name }}
        run: |
          RUN_ID=$(gh api \
            "repos/${{ github.repository }}/actions/artifacts?per_page=100" \
            --jq '[.artifacts[] | select(.name == "'"$ARTIFACT_NAME"'") | select(.expired == false)] | sort_by(.created_at) | last | .workflow_run.id')
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "Could not find non-expired artifact: $ARTIFACT_NAME"
            exit 1
          fi
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.resolve_artifact.outputs.artifact_name }}
          path: workspace/
          run-id: ${{ steps.artifact_run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve manifest path
        id: meta
        run: |
          MANIFEST=$(find workspace -name "manifest_*.json" | sort | tail -1)
          if [ -z "$MANIFEST" ]; then
            echo "No manifest found – aborting."
            exit 1
          fi
          echo "manifest=$MANIFEST" >> "$GITHUB_OUTPUT"
      - name: Publish to TikTok
        env:
          TIKTOK_CLIENT_KEY_ANGEL:     ${{ secrets.TIKTOK_CLIENT_KEY_ANGEL }}
          TIKTOK_CLIENT_SECRET_ANGEL:  ${{ secrets.TIKTOK_CLIENT_SECRET_ANGEL }}
          TIKTOK_REFRESH_TOKEN_ANGEL:  ${{ secrets.TIKTOK_REFRESH_TOKEN_ANGEL }}
          PYTHONPATH:                  ${{ github.workspace }}
        run: |
          NUMBER_ARG=""
          if [ -n "${{ github.event.inputs.number }}" ]; then
            NUMBER_ARG="--number ${{ github.event.inputs.number }}"
          fi
          python src/angelnumbers_main.py \
            --publish-only "${{ steps.meta.outputs.manifest }}" \
            --skip-youtube \
            $NUMBER_ARG
