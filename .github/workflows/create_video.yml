name: Daily Video Pipeline

on:
  schedule:
    - cron: "0 9 * * *"   # Every day at 09:00 UTC
  workflow_dispatch:        # Allow manual triggers from the Actions tab

jobs:
  create-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies (ffmpeg)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          # ── AI ────────────────────────────────────────────────────────────
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

          # ── YouTube ───────────────────────────────────────────────────────
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}

          # ── TikTok ────────────────────────────────────────────────────────
          TIKTOK_CLIENT_KEY:     ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET:  ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_REFRESH_TOKEN:  ${{ secrets.TIKTOK_REFRESH_TOKEN }}
          # Optional: set to SELF_ONLY during testing, PUBLIC_TO_EVERYONE for live
          TIKTOK_PRIVACY:        ${{ secrets.TIKTOK_PRIVACY }}

        run: |
          export PYTHONPATH=$(pwd)/src
          python src/main.py
