name: 🎬 Daily Video Pipeline

on:
  schedule:
    - cron: "0 9 * * *"   # Every day at 09:00 UTC
  workflow_dispatch:
    inputs:
      run_id:
        description: >
          Resume a previous run — paste the run_id printed in a failed
          run's summary (leave blank to start a fresh run).
        required: false
        default: ""
      dry_run:
        description: "Skip YouTube upload (test mode)"
        required: false
        default: "false"

concurrency:
  group: video-pipeline
  cancel-in-progress: false

jobs:
  # ── Job 1: Pre-flight checks ─────────────────────────────────────────────
  preflight:
    name: Pre-flight credential check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install validation deps
        run: pip install -q requests edge-tts

      - name: Validate all credentials and APIs
        env:
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          TIKTOK_CLIENT_KEY:     ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET:  ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_REFRESH_TOKEN:  ${{ secrets.TIKTOK_REFRESH_TOKEN }}
          PYTHONPATH:            ${{ github.workspace }}/src
        run: python scripts/validate_credentials.py

  # ── Job 2: Create & publish video ────────────────────────────────────────
  create-and-publish:
    name: Generate & Publish Video
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: preflight

    outputs:
      run_id: ${{ steps.resolve_run_id.outputs.value }}

    steps:
      - uses: actions/checkout@v4

      # ── Determine run_id ────────────────────────────────────────────────
      - name: Resolve run_id
        id: resolve_run_id
        run: |
          if [ -n "${{ github.event.inputs.run_id }}" ]; then
            RUN_ID="${{ github.event.inputs.run_id }}"
            echo "▶ Resuming run: $RUN_ID"
            MODE="resume"
          else
            RUN_ID=$(python3 -c "import uuid; print(str(uuid.uuid4())[:8])")
            echo "▶ Fresh run: $RUN_ID"
            MODE="fresh"
          fi

          echo "value=$RUN_ID" >> "$GITHUB_OUTPUT"

          {
            echo "## 🎬 Pipeline run_id: \`$RUN_ID\`"
            echo ""
            if [ "$MODE" = "resume" ]; then
              echo "▶ **Resuming** a previous run — completed steps will be skipped."
            else
              echo "▶ **Fresh run** — all steps will execute."
            fi
            echo ""
            echo "---"
            echo "### ♻️ How to resume if this run fails"
            echo "1. Fix the code and push."
            echo "2. Go to **Actions → Daily Video Pipeline → Run workflow**."
            echo "3. Paste \`$RUN_ID\` into the **run_id** field."
            echo "4. Click **Run workflow** — already-completed steps will be skipped."
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Restore topic history (persists across ALL daily runs) ───────────
      # Key never changes — always restore the latest save.
      - name: Restore topic history cache
        id: topic_history_restore
        uses: actions/cache/restore@v4
        with:
          path: used_topics.json
          key: topic-history-always-latest
          restore-keys: |
            topic-history-

      - name: Report topic history status
        run: |
          if [ -f used_topics.json ]; then
            COUNT=$(python3 -c "import json; d=json.load(open('used_topics.json')); print(len(d))")
            echo "✅ Topic history loaded — $COUNT topics on record."
          else
            echo "ℹ️  No topic history found — starting fresh (expected on first run)."
          fi

      # ── Restore workspace from a previous run (cache miss = fresh start) ─
      - name: Restore workspace cache
        id: cache_restore
        uses: actions/cache/restore@v4
        with:
          path: workspace/
          key: pipeline-${{ steps.resolve_run_id.outputs.value }}-${{ github.run_number }}
          restore-keys: |
            pipeline-${{ steps.resolve_run_id.outputs.value }}-

      - name: Report cache status
        run: |
          if [ "${{ steps.cache_restore.outputs.cache-hit }}" = "true" ]; then
            echo "✅ Workspace restored from cache — completed steps will be skipped."
          else
            echo "ℹ️  No cache found — starting from scratch."
          fi

      # ── System deps ─────────────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg fonts-dejavu-core fonts-liberation python3-dev libffi-dev
          ffmpeg -version | head -1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      # ── Run the pipeline ─────────────────────────────────────────────────
      - name: Run video pipeline
        env:
          PIPELINE_RUN_ID:       ${{ steps.resolve_run_id.outputs.value }}
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_PRIVACY:       ${{ vars.YOUTUBE_PRIVACY || 'public' }}
          DRY_RUN:               ${{ github.event.inputs.dry_run || 'false' }}
          PYTHONPATH:            ${{ github.workspace }}/src
        run: python src/main.py

      # ── Always save topic history so next run benefits from it ───────────
      # Save with a timestamped key so GitHub keeps it, but restore-keys
      # prefix "topic-history-" always finds the latest one.
      - name: Save topic history cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: used_topics.json
          key: topic-history-${{ github.run_number }}

      # ── Always save workspace so failed runs can be resumed ──────────────
      - name: Save workspace cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: workspace/
          key: pipeline-${{ steps.resolve_run_id.outputs.value }}-${{ github.run_number }}

      # ── Artifacts ────────────────────────────────────────────────────────
      - name: Upload pipeline state (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-state-${{ steps.resolve_run_id.outputs.value }}
          path: workspace/${{ steps.resolve_run_id.outputs.value }}/pipeline_state.json
          if-no-files-found: ignore
          overwrite: true
          retention-days: 30

      - name: Upload video
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: video-${{ steps.resolve_run_id.outputs.value }}
          path: workspace/${{ steps.resolve_run_id.outputs.value }}/final_video.mp4
          retention-days: 7

  # ── Job 3: Alert on failure (with resume instructions) ───────────────────
  notify-failure:
    name: Failure alert
    runs-on: ubuntu-latest
    needs: [preflight, create-and-publish]
    if: failure()

    steps:
      - name: Write failure summary
        run: |
          RUN_ID="${{ needs.create-and-publish.outputs.run_id }}"
          {
            echo "## ❌ FactsUnlocked pipeline failed"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Run number | #${{ github.run_number }} |"
            echo "| Time | $(date -u '+%Y-%m-%d %H:%M UTC') |"
            echo "| Logs | ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} |"
            echo ""
            echo "### ♻️ Resume this run after fixing the code"
            echo "1. Push your fix."
            echo "2. **Actions → Daily Video Pipeline → Run workflow**."
            echo "3. Set **run_id** = \`$RUN_ID\`"
            echo "4. Click **Run workflow**."
          } >> "$GITHUB_STEP_SUMMARY"

          echo "::error::Pipeline failed — see ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
